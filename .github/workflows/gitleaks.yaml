name: Gitleaks Scan

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
           GITHUB_TOKEN:{{secrets.GITHUB_TOKEN}}